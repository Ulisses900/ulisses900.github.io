<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somax Studios | Músicas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-slate-50 text-slate-900">

<!-- O menu lateral será injetado via JavaScript antes deste conteúdo -->
<div class="md:ml-64"> <!-- Desloca o conteúdo principal no desktop para não ficar sob a sidebar -->

    <!-- Container onde o cabeçalho será inserido -->
    <div id="header-container"></div>

    <main class="min-h-screen p-4 md:p-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase text-slate-800">Músicas</h1>
                <p class="text-slate-500 text-xs font-medium">Catálogo geral de faixas e autores</p>
            </div>
            
            <div class="flex items-center gap-2">
                 <button id="clear-filters" class="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all">
                    <i class="fas fa-filter-circle-xmark mr-1"></i> Limpar
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="md:col-span-2 relative">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <input type="text" id="search-input" placeholder="Buscar música ou autor..." 
                       class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
            </div>
            
            <select id="tape-filter" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm focus:outline-none">
                <option value="">Todos os Tapes</option>
            </select>

            <select id="order-select" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm focus:outline-none">
                <option value="catalogo">Ordem: Catálogo (Musicas)</option>
                <option value="musica_asc">Título (A-Z)</option>
                <option value="autor_asc">Autor (A-Z)</option>
            </select>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            
            <div class="hidden md:block">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Lado</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Título da Música</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Autor</th>
                            <th class="px-6 py-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">Tape Vinculado</th>
                            <th class="px-6 py-4 text-right text-[10px] font-black text-slate-500 uppercase tracking-widest">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="musicas-tbody-desktop" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>

            <div id="musicas-list-mobile" class="md:hidden divide-y divide-slate-100">
                </div>

            <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex items-center justify-between">
                <span class="text-[10px] font-black text-slate-400 uppercase" id="pagination-info">Pág 1</span>
                <div class="flex gap-2">
                    <button id="prev-btn" class="p-2 px-4 bg-white border rounded-xl text-xs font-bold disabled:opacity-30">Anterior</button>
                    <button id="next-btn" class="p-2 px-4 bg-white border rounded-xl text-xs font-bold disabled:opacity-30">Próximo</button>
                </div>
            </div>
        </div>
    </main>

</div>

<!-- Script do menu (sidebar e cabeçalho) - igual ao usado em tapes.html -->
<script>
    // ==================== menu.js ====================
    const sidebarHTML = `
    <aside id="sidebar"
    class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-50 flex flex-col justify-between transition-transform -translate-x-full md:translate-x-0">

        <!-- Parte superior -->
        <div>
            <div class="p-6 border-b border-slate-100">
                <h2 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    <i class="fas fa-compact-disc"></i> Somax Studios
                </h2>
                <p class="text-[11px] text-slate-500 mt-2 uppercase tracking-wide">
                    Acervo Musical Digital
                </p>
            </div>

            <nav class="mt-4">
                <a href="index.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-home w-5"></i> Dashboard
                </a>
                <a href="tapes.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-tape w-5"></i> Tapes
                </a>
                <a href="musicas.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-music w-5"></i> Músicas
                </a>
                <a href="artistas.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-microphone w-5"></i> Artistas
                </a>
                <a href="gravadoras.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-building w-5"></i> Gravadoras
                </a>
            </nav>
        </div>

        <!-- Parte inferior / Créditos -->
        <div class="p-6 border-t border-slate-100 bg-slate-50">
            <p class="text-[10px] text-slate-500 uppercase font-semibold tracking-wide">
                Acervo Musical Somax
            </p>
            <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">
                Sistema interno de gestão de tapes, faixas e artistas.
            </p>
            <p class="text-[10px] text-slate-400 mt-3">
                © 2026 Somax Studios
            </p>
        </div>

    </aside>
    `;

    const headerHTML = `
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40">
        
        <button id="menuMobile" class="md:hidden text-slate-600 text-xl">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Texto institucional -->
        <div class="text-sm font-semibold text-slate-600 uppercase tracking-wide hidden sm:block">
            Acervo Musical Somax Studios
        </div>

        <div class="text-[11px] text-slate-400 uppercase tracking-wider">
            Gestão de Catálogo
        </div>

    </header>
    `;

    // Injeta o HTML ao carregar
    document.addEventListener("DOMContentLoaded", () => {

        document.body.insertAdjacentHTML('afterbegin', sidebarHTML);
        const headerContainer = document.getElementById('header-container');
        if (headerContainer) {
            headerContainer.innerHTML = headerHTML;
        }

        // Menu mobile
        const menuMobile = document.getElementById('menuMobile');
        if (menuMobile) {
            menuMobile.addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('-translate-x-full');
            });
        }

        // Link ativo
        const currentPage = window.location.pathname.split("/").pop() || "index.html";

        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('bg-slate-50', 'text-indigo-600', 'border-r-4', 'border-indigo-600');
            } else {
                link.classList.add('text-slate-600');
            }
        });

    });
</script>

<!-- Script principal da página (listagem de músicas) -->
<script>
    const supabaseClient = supabase.createClient(
        'https://edabpftowxcyvsmuzzdf.supabase.co',
        'sb_publishable_xUUhpgcgM7bc2Q5a02smMw_n5xDicbW'
    );

    let currentPage = 1;
    const itemsPerPage = 15;
    let selectedTape = '';
    let selectedOrder = 'catalogo';

    function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

    async function carregarTapesNoFiltro() {
        const { data } = await supabaseClient.from('tapes').select('id, titulo').order('titulo');
        const sel = document.getElementById('tape-filter');
        if (sel && data) {
            data.forEach(t => {
                sel.innerHTML += `<option value="${t.id}">${t.titulo}</option>`;
            });
        }
    }

    async function carregarMusicas() {
        const search = document.getElementById('search-input').value;
        const from = (currentPage - 1) * itemsPerPage;
        const to = from + itemsPerPage - 1;

        let query = supabaseClient.from('faixas').select('*, tapes(id, titulo, numero_tape)', { count: 'exact' });

        if (search) query = query.or(`musica.ilike.%${search}%,autor.ilike.%${search}%`);
        if (selectedTape) query = query.eq('tape_id', selectedTape);

        if (selectedOrder === 'musica_asc') query = query.order('musica', { ascending: true });
        else if (selectedOrder === 'autor_asc') query = query.order('autor', { ascending: true });
        else query = query.order('id', { ascending: false });

        const { data, count, error } = await query.range(from, to);

        if (error) return;
        renderizar(data || []);

        document.getElementById('pagination-info').textContent = `PÁGINA ${currentPage} • TOTAL ${count}`;
        document.getElementById('prev-btn').disabled = currentPage === 1;
        document.getElementById('next-btn').disabled = to >= (count - 1);
    }

    function renderizar(musicas) {
        const desktop = document.getElementById('musicas-tbody-desktop');
        const mobile = document.getElementById('musicas-list-mobile');
        
        // Render Desktop
        desktop.innerHTML = musicas.map(m => `
            <tr class="hover:bg-slate-50 transition-colors">
                <td class="px-6 py-4 text-xs font-bold text-slate-400">${esc(m.lado || '—')}</td>
                <td class="px-6 py-4 text-sm font-black text-slate-900 uppercase tracking-tight">${esc(m.musica)}</td>
                <td class="px-6 py-4 text-[10px] font-bold text-slate-500 uppercase">${esc(m.autor || 'N/I')}</td>
                <td class="px-6 py-4">
                    <span class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md uppercase">
                        ${esc(m.tapes?.numero_tape)} - ${esc(m.tapes?.titulo)}
                    </span>
                </td>
                <td class="px-6 py-4 text-right">
                    <a href="musicas_view.html?id=${m.id}" class="p-2 text-slate-300 hover:text-indigo-600">
                        <i class="fas fa-eye"></i>
                    </a>
                </td>
            </tr>
        `).join('');

        // Render Mobile (Cards)
        mobile.innerHTML = musicas.map(m => `
            <div class="p-4 flex flex-col gap-1">
                <div class="flex justify-between items-start">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Lado ${esc(m.lado || '—')}</span>
                    <a href="musicas_view.html?id=${m.id}" class="text-indigo-600 p-1"><i class="fas fa-eye text-sm"></i></a>
                </div>
                <h3 class="text-[13px] font-black text-slate-900 uppercase leading-tight">${esc(m.musica)}</h3>
                <div class="mt-2 space-y-1">
                    <p class="text-[11px] text-slate-500 font-medium">
                        <i class="fas fa-user-edit mr-1 text-slate-300"></i> ${esc(m.autor || 'NÃO INFORMADO')}
                    </p>
                    <p class="text-[10px] font-black text-indigo-600 uppercase">
                        <i class="fas fa-compact-disc mr-1 text-indigo-300"></i> ${esc(m.tapes?.numero_tape)} - ${esc(m.tapes?.titulo)}
                    </p>
                </div>
            </div>
        `).join('');
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
        // Elementos podem já ter sido carregados, mas vamos garantir
        carregarTapesNoFiltro();
        carregarMusicas();

        // Filtros
        document.getElementById('search-input').oninput = () => { currentPage = 1; carregarMusicas(); };
        document.getElementById('order-select').onchange = e => { selectedOrder = e.target.value; currentPage = 1; carregarMusicas(); };
        document.getElementById('tape-filter').onchange = e => { selectedTape = e.target.value; currentPage = 1; carregarMusicas(); };

        document.getElementById('clear-filters').onclick = () => {
            document.getElementById('order-select').value = 'catalogo';
            document.getElementById('tape-filter').value = '';
            document.getElementById('search-input').value = '';
            selectedOrder = 'catalogo';
            selectedTape = '';
            currentPage = 1;
            carregarMusicas();
        };

        document.getElementById('prev-btn').onclick = () => { if(currentPage > 1) { currentPage--; carregarMusicas(); window.scrollTo(0,0); } };
        document.getElementById('next-btn').onclick = () => { currentPage++; carregarMusicas(); window.scrollTo(0,0); };
    });
</script>

</body>
</html>
