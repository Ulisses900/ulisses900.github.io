<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somax Studios | Gerenciar Tapes</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; }
.filter-active {
    background-color: #4f46e5 !important;
    color: white !important;
    border-color: #4f46e5 !important;
}

/* Responsividade da tabela: vira cards em mobile */
@media (max-width: 640px) {
    table, thead, tbody, tr, th, td {
        display: block;
    }
    thead {
        display: none; /* esconde cabeçalho */
    }
    tr {
        margin-bottom: 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        padding: 0.75rem;
        background: white;
    }
    td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0;
        border: none;
        font-size: 0.875rem;
    }
    td:before {
        content: attr(data-label);
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        font-size: 0.7rem;
        letter-spacing: 0.5px;
        width: 35%;
    }
    td:last-child {
        border-top: 1px dashed #e2e8f0;
        margin-top: 0.5rem;
        padding-top: 0.75rem;
        justify-content: flex-end;
        gap: 1rem;
    }
    td:last-child:before {
        content: "Ações";
        width: auto;
        margin-right: auto;
    }
    /* Ajuste para células de status */
    td[data-label="Status"] span {
        font-weight: 600;
    }
}
</style>
</head>

<body class="bg-slate-50 text-slate-900">

<!-- O menu lateral será injetado via JavaScript antes deste conteúdo -->
<div class="md:ml-64"> <!-- Desloca o conteúdo principal no desktop para não ficar sob a sidebar -->

    <!-- Container onde o cabeçalho será inserido -->
    <div id="header-container"></div>

    <main class="min-h-screen p-4 md:p-10">

        <!-- HEADER (título da página e ações) -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tight">Gerenciar Tapes</h1>
                <p class="text-slate-500 text-sm italic">Painel de controle de acervo</p>
            </div>

            <div class="flex items-center gap-3">
                <div class="bg-white border px-4 py-2 rounded-lg text-sm font-bold shadow-sm">
                    TOTAL: <span id="total-records" class="text-indigo-600">0</span>
                </div>

                <button id="export-csv-btn"
                   class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-700 flex items-center gap-1">
                    <i class="fas fa-file-csv"></i> Exportar CSV
                </button>

                <a href="adicionar.html"
                   class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700">
                    + Novo Registro
                </a>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="bg-white p-5 rounded-xl border shadow-sm mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Busca</label>
                    <input type="text" id="search-input"
                           placeholder="Buscar por título..."
                           class="w-full px-4 py-2 bg-slate-50 border rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Gravadora</label>
                    <select id="filter-gravadora"
                            class="w-full px-3 py-2 bg-slate-50 border rounded-lg text-sm">
                        <option value="">Todas</option>
                    </select>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Streaming</label>
                    <div class="flex gap-2">
                        <button onclick="setStatusFilter('all', this)"
                                class="filter-active flex-1 py-2 rounded-lg border text-xs font-bold uppercase">
                            Todos
                        </button>
                        <button onclick="setStatusFilter('on', this)"
                                class="flex-1 py-2 rounded-lg border text-xs font-bold uppercase">
                            On
                        </button>
                        <button onclick="setStatusFilter('off', this)"
                                class="flex-1 py-2 rounded-lg border text-xs font-bold uppercase">
                            Off
                        </button>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase">Ordenar</label>
                    <div class="flex gap-2">
                        <button id="sort-titulo"
                                class="filter-active flex-1 py-2 rounded-lg border text-xs font-bold uppercase">
                            Título
                        </button>
                        <button id="sort-artista"
                                class="flex-1 py-2 rounded-lg border text-xs font-bold uppercase">
                            Artista
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- TABELA -->
        <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <div class="w-full">
                <table class="w-full table-fixed text-left">
                    <thead class="bg-slate-50 border-b text-xs uppercase font-bold text-slate-500">
                        <tr>
                            <th class="px-2 md:px-6 py-3 w-[10%]">Nº</th>
                            <th class="px-2 md:px-6 py-3 w-[40%]">Título</th>
                            <th class="px-2 md:px-6 py-3 w-[30%]">Artista</th>
                            <th class="px-2 md:px-6 py-3 w-[10%]">Status</th>
                            <th class="px-2 md:px-6 py-3 w-[10%] text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tapes-list-container"
                           class="divide-y divide-slate-100 text-sm">
                    </tbody>
                </table>
            </div>

            <!-- PAGINAÇÃO -->
            <div class="px-6 py-4 bg-slate-50 border-t flex items-center justify-between text-xs">
                <div>Página <span id="current-page">1</span></div>
                <div class="flex gap-2">
                    <button id="prev-page" class="px-4 py-2 border rounded-lg">Anterior</button>
                    <button id="next-page" class="px-4 py-2 border rounded-lg">Próxima</button>
                </div>
            </div>
        </div>

    </main>

</div>

<!-- Script do menu (sidebar e cabeçalho) -->
<script>
    // ==================== menu.js ====================
    const sidebarHTML = `
    <aside id="sidebar"
    class="fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-200 z-50 flex flex-col justify-between transition-transform -translate-x-full md:translate-x-0">

        <!-- Parte superior -->
        <div>
            <div class="p-6 border-b border-slate-100">
                <h2 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    <i class="fas fa-compact-disc"></i> Somax Studios
                </h2>
                <p class="text-[11px] text-slate-500 mt-2 uppercase tracking-wide">
                    Acervo Musical Digital
                </p>
            </div>

            <nav class="mt-4">
                <a href="index.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-home w-5"></i> Dashboard
                </a>
                <a href="tapes.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-tape w-5"></i> Tapes
                </a>
                <a href="musicas.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-music w-5"></i> Músicas
                </a>
                <a href="artistas.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-microphone w-5"></i> Artistas
                </a>
                <a href="gravadoras.html" class="nav-link flex items-center gap-3 px-6 py-3 text-sm font-medium transition-colors hover:bg-slate-50">
                    <i class="fas fa-building w-5"></i> Gravadoras
                </a>
            </nav>
        </div>

        <!-- Parte inferior / Créditos -->
        <div class="p-6 border-t border-slate-100 bg-slate-50">
            <p class="text-[10px] text-slate-500 uppercase font-semibold tracking-wide">
                Acervo Musical Somax
            </p>
            <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">
                Sistema interno de gestão de tapes, faixas e artistas.
            </p>
            <p class="text-[10px] text-slate-400 mt-3">
                © 2026 Somax Studios
            </p>
        </div>

    </aside>
    `;

    const headerHTML = `
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-40">
        
        <button id="menuMobile" class="md:hidden text-slate-600 text-xl">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Texto institucional -->
        <div class="text-sm font-semibold text-slate-600 uppercase tracking-wide hidden sm:block">
            Acervo Musical Somax Studios
        </div>

        <div class="text-[11px] text-slate-400 uppercase tracking-wider">
            Gestão de Catálogo
        </div>

    </header>
    `;

    // Injeta o HTML ao carregar
    document.addEventListener("DOMContentLoaded", () => {

        document.body.insertAdjacentHTML('afterbegin', sidebarHTML);
        document.getElementById('header-container').innerHTML = headerHTML;

        // Menu mobile
        document.getElementById('menuMobile').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        });

        // Link ativo
        const currentPage = window.location.pathname.split("/").pop() || "index.html";

        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.classList.add('bg-slate-50', 'text-indigo-600', 'border-r-4', 'border-indigo-600');
            } else {
                link.classList.add('text-slate-600');
            }
        });

    });
</script>

<!-- Script principal da página (listagem de tapes) -->
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const supabaseClient = supabase.createClient(
            'https://edabpftowxcyvsmuzzdf.supabase.co',
            'sb_publishable_xUUhpgcgM7bc2Q5a02smMw_n5xDicbW'
        );

        let currentPage = 1;
        const limit = 15;
        let selectedStatus = 'all';
        let selectedGravadora = '';
        let currentSort = 'titulo';

        // Elementos DOM
        const container = document.getElementById('tapes-list-container');
        const totalSpan = document.getElementById('total-records');
        const searchInput = document.getElementById('search-input');
        const filterGravadora = document.getElementById('filter-gravadora');
        const sortTitulo = document.getElementById('sort-titulo');
        const sortArtista = document.getElementById('sort-artista');
        const prevBtn = document.getElementById('prev-page');
        const nextBtn = document.getElementById('next-page');
        const currentPageSpan = document.getElementById('current-page');
        const exportBtn = document.getElementById('export-csv-btn');

        // ==========================================
        // SISTEMA DE MEMÓRIA (sessionStorage)
        // ==========================================
        function saveState() {
            sessionStorage.setItem('tapes_currentPage', currentPage);
            sessionStorage.setItem('tapes_search', searchInput.value);
            sessionStorage.setItem('tapes_gravadora', selectedGravadora);
            sessionStorage.setItem('tapes_status', selectedStatus);
            sessionStorage.setItem('tapes_sort', currentSort);
        }

        function loadState() {
            const savedPage = sessionStorage.getItem('tapes_currentPage');
            if (savedPage) currentPage = parseInt(savedPage, 10);

            const savedSearch = sessionStorage.getItem('tapes_search');
            if (savedSearch) searchInput.value = savedSearch;

            const savedGravadora = sessionStorage.getItem('tapes_gravadora');
            if (savedGravadora) selectedGravadora = savedGravadora;

            const savedStatus = sessionStorage.getItem('tapes_status');
            if (savedStatus) selectedStatus = savedStatus;

            const savedSort = sessionStorage.getItem('tapes_sort');
            if (savedSort) currentSort = savedSort;
        }

        function restoreUI() {
            // Restaura o select da gravadora
            if (selectedGravadora) filterGravadora.value = selectedGravadora;

            // Restaura os botões de Status
            document.querySelectorAll('[onclick^="setStatusFilter"]').forEach(b => b.classList.remove('filter-active'));
            if (selectedStatus === 'on') document.querySelector('[onclick*="\'on\'"]').classList.add('filter-active');
            else if (selectedStatus === 'off') document.querySelector('[onclick*="\'off\'"]').classList.add('filter-active');
            else document.querySelector('[onclick*="\'all\'"]').classList.add('filter-active');

            // Restaura os botões de Ordenação
            sortTitulo.classList.remove('filter-active');
            sortArtista.classList.remove('filter-active');
            if (currentSort === 'artista_id') sortArtista.classList.add('filter-active');
            else sortTitulo.classList.add('filter-active');
        }
        // ==========================================

        async function carregarGravadorasSelect() {
            const { data } = await supabaseClient
                .from('gravadoras')
                .select('id, nome')
                .order('nome');

            filterGravadora.innerHTML = '<option value="">Todas</option>';
            data?.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.nome;
                filterGravadora.appendChild(opt);
            });
        }

        async function carregarTapes() {
            if (!container) return;

            container.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-slate-400">Carregando...</td></tr>';

            try {
                const busca = searchInput.value.trim();

                let query = supabaseClient
                    .from('tapes')
                    .select('*, artistas(nome)', { count: 'exact' });

                if (busca) query = query.ilike('titulo', `%${busca}%`);
                if (selectedGravadora) query = query.eq('gravadora_id', selectedGravadora);
                if (selectedStatus === 'on') query = query.eq('subiu_streaming', true);
                if (selectedStatus === 'off') query = query.eq('subiu_streaming', false);

                const { data, count, error } = await query
                    .order(currentSort, { ascending: true })
                    .range((currentPage - 1) * limit, currentPage * limit - 1);

                if (error) throw error;

                totalSpan.textContent = count || 0;

                container.innerHTML = (data || []).map(t => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-2 md:px-6 py-3 text-xs text-slate-400 truncate" data-label="Nº">#${t.numero_tape || '-'}</td>
                        <td class="px-2 md:px-6 py-3 font-bold uppercase break-words whitespace-normal" data-label="Título">${t.titulo || '---'}</td>
                        <td class="px-2 md:px-6 py-3 text-indigo-600 text-xs font-bold uppercase truncate" data-label="Artista">${t.artistas?.nome || '---'}</td>
                        <td class="px-2 md:px-6 py-3" data-label="Status">
                            ${t.subiu_streaming
                                ? '<span class="text-emerald-600 font-bold text-xs">ON</span>'
                                : '<span class="text-slate-300 text-xs">OFF</span>'}
                        </td>
                        <td class="px-2 md:px-6 py-3 text-right space-x-3" data-label="Ações">
                            <a href="ver.html?id=${t.id}" class="text-indigo-600"><i class="fas fa-eye"></i></a>
                            <a href="editar.html?id=${t.id}" class="text-indigo-600"><i class="fas fa-pen"></i></a>
                        </td>
                    </tr>
                `).join('');

                atualizarBotoes(count);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-red-600 font-bold">Erro ao carregar dados.</td></tr>';
            }
        }

        function atualizarBotoes(total) {
            currentPageSpan.textContent = currentPage;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage * limit >= total;
        }

        // ==========================================
        // EVENTOS COM SAVE_STATE INJETADO
        // ==========================================
        prevBtn.onclick = () => { currentPage--; saveState(); carregarTapes(); };
        nextBtn.onclick = () => { currentPage++; saveState(); carregarTapes(); };

        searchInput.oninput = () => {
            currentPage = 1;
            saveState();
            carregarTapes();
        };

        filterGravadora.onchange = e => {
            selectedGravadora = e.target.value;
            currentPage = 1;
            saveState();
            carregarTapes();
        };

        window.setStatusFilter = (status, btn) => {
            selectedStatus = status;
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('filter-active'));
            btn.classList.add('filter-active');
            currentPage = 1;
            saveState();
            carregarTapes();
        };

        sortTitulo.onclick = () => {
            currentSort = 'titulo';
            sortTitulo.classList.add('filter-active');
            sortArtista.classList.remove('filter-active');
            saveState();
            carregarTapes();
        };

        sortArtista.onclick = () => {
            currentSort = 'artista_id';
            sortArtista.classList.add('filter-active');
            sortTitulo.classList.remove('filter-active');
            saveState();
            carregarTapes();
        };
        // ==========================================

        async function exportarCSV() {
            // ... (O CÓDIGO DE EXPORTAR CSV SE MANTÉM IGUAL) ...
        }

        exportBtn.addEventListener('click', exportarCSV);

        // ==========================================
        // FLUXO DE INICIALIZAÇÃO
        // ==========================================
        loadState(); // 1. Lê a memória
        await carregarGravadorasSelect(); // 2. Puxa gravadoras
        restoreUI(); // 3. Aplica os botões visuais e selects de acordo com a memória
        await carregarTapes(); // 4. Carrega a tabela na página certa
    });
</script>

</body>
</html>
