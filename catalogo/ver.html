<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Tape | Somax Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        /* Estilo da Tabela Responsiva (Mobile) */
        @media (max-width: 768px) {
            .mobile-table-card thead { display: none; }
            .mobile-table-card tr { 
                display: block; border: 1px solid #e2e8f0; border-radius: 12px; 
                margin-bottom: 1rem; padding: 12px; background: white;
            }
            .mobile-table-card td { display: flex; padding: 6px 0; border: none; font-size: 13px; }
            .mobile-table-card td::before {
                content: attr(data-label); font-weight: 800; width: 100px; 
                min-width: 100px; color: #64748b; text-transform: uppercase; font-size: 10px;
            }
        }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-900">

<div class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <nav class="flex items-center text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest" id="breadcrumb">
            <a href="index.html" class="hover:text-indigo-600">DASHBOARD</a> 
            <span class="mx-2">/</span> 
            <a href="tapes.html" class="hover:text-indigo-600">TAPES</a> 
            <span class="mx-2">/</span> 
            <span class="text-slate-600">DETALHES</span>
        </nav>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-slate-900 uppercase tracking-tight" id="titulo">Carregando...</h1>
                <p class="text-slate-500 text-sm font-medium mt-1" id="artista-gravadora">Carregando informações...</p>
            </div>
            
            <div class="grid grid-cols-2 md:flex items-center gap-2">
                <a href="#" id="edit-btn" class="flex items-center justify-center px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all">
                    <i class="fas fa-edit mr-2 text-indigo-500"></i> Editar
                </a>
                <a href="#" id="printFichaBtn" class="flex items-center justify-center px-4 py-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
                    <i class="fas fa-print mr-2"></i> Ficha Técnica
                </a>
                
                <a href="tapes.html" class="flex items-center justify-center px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all col-span-2 md:col-span-1">
                    ← Voltar
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Informações Gerais</p>
                <div id="info-geral" class="space-y-2 text-sm"></div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Artista / Gravadora</p>
                <div id="info-artista" class="space-y-2 text-sm"></div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Estatísticas</p>
                <div id="info-estatisticas" class="space-y-2 text-sm"></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                <h2 class="font-black text-xs uppercase tracking-widest text-slate-600">Músicas do Tape</h2>
                <span id="faixas-count" class="text-[10px] font-black bg-indigo-100 text-indigo-700 px-2 py-1 rounded-md">0 FAIXAS</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full mobile-table-card">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest border-b">Lado</th>
                            <th class="px-6 py-3 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest border-b">Música</th>
                            <th class="px-6 py-3 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest border-b">Autor</th>
                            <th class="px-6 py-3 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest border-b">Editora</th>
                            <th class="px-6 py-3 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest border-b">Gravadora</th>
                            <th class="px-6 py-3 text-left text-[10px] font-black text-slate-500 uppercase tracking-widest border-b">%</th>
                        </tr>
                    </thead>
                    <tbody id="faixas-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="observacoes-container" class="mt-6 bg-white rounded-2xl border border-slate-200 p-6 hidden">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Observações</p>
            <p id="observacoes" class="text-sm text-slate-700 italic leading-relaxed"></p>
        </div>

    </div>
</div>

<script>
    const SUPABASE_URL = 'https://edabpftowxcyvsmuzzdf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_xUUhpgcgM7bc2Q5a02smMw_n5xDicbW';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const tapeId = urlParams.get('id');

    if (!tapeId) location.href = 'tapes.html';

    const safeHTML = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
    const safeText = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };

    async function carregarDados() {
        try {
            // Consulta sem a coluna 'bio' para evitar o erro 400
            const { data: tape, error } = await supabaseClient
                .from('tapes')
                .select('*, artistas(nome), gravadoras(nome)')
                .eq('id', tapeId).single();

            if (error) throw error;

            const { data: faixas, error: fError } = await supabaseClient
                .from('faixas')
                .select('*')
                .eq('tape_id', tapeId)
                .order('numero', { ascending: true });

            if (fError) throw fError;

            renderizar(tape, faixas || []);
        } catch (err) {
            console.error("Erro no carregamento:", err);
        }
    }

    function renderizar(tape, faixas) {
        safeText('titulo', tape.titulo || 'Sem Título');
        safeText('artista-gravadora', `${tape.artistas?.nome || 'Artista N/I'} • ${tape.gravadoras?.nome || 'Gravadora N/I'}`);

        const editBtn = document.getElementById('edit-btn');
        if(editBtn) editBtn.href = `editar.html?id=${tape.id}`;
        
        const printBtn = document.getElementById('printFichaBtn');
        if(printBtn) printBtn.href = `ficha_tape.html?id=${tape.id}`;

        safeHTML('info-geral', `
            <p><strong>Nº Tape:</strong> ${tape.numero_tape || '—'}</p>
            <p><strong>Status:</strong> ${tape.subiu_streaming ? '🟢 On Stream' : '🔴 Off'}</p>
            <p><strong>Ano:</strong> ${tape.ano || '—'}</p>
        `);

        safeHTML('info-artista', `
            <p><strong>Artista:</strong> ${tape.artistas?.nome || '—'}</p>
            <p><strong>Gravadora:</strong> ${tape.gravadoras?.nome || '—'}</p>
        `);

        safeHTML('info-estatisticas', `
            <p><strong>Total Faixas:</strong> ${faixas.length}</p>
            <p><strong>Gênero:</strong> ${tape.genero || '—'}</p>
        `);

        const tbody = document.getElementById('faixas-tbody');
        if (tbody) {
            const gravName = tape.gravadoras?.nome || '—';
            tbody.innerHTML = faixas.map(f => `
                <tr>
                    <td data-label="Lado" class="px-6 py-4 text-xs font-bold text-slate-500">${f.lado || '—'}</td>
                    <td data-label="Música" class="px-6 py-4 text-sm font-black text-slate-900 uppercase">${f.musica || '—'}</td>
                    <td data-label="Autor" class="px-6 py-4 text-xs text-slate-600">${f.autor || '—'}</td>
                    <td data-label="Editora" class="px-6 py-4 text-xs text-slate-600">${f.editora || '—'}</td>
                    <td data-label="Gravadora" class="px-6 py-4 text-xs text-slate-600">${gravName}</td>
                    <td data-label="%" class="px-6 py-4 text-xs font-black text-indigo-600">${f.percentual ? f.percentual+'%' : '—'}</td>
                </tr>
            `).join('');
        }

        safeText('faixas-count', `${faixas.length} FAIXAS`);

        if (tape.observacoes) {
            const obsCont = document.getElementById('observacoes-container');
            if(obsCont) {
                obsCont.classList.remove('hidden');
                safeText('observacoes', tape.observacoes);
            }
        }
    }

    document.addEventListener('DOMContentLoaded', carregarDados);
</script>

</body>
</html>
