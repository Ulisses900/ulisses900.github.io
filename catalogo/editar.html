<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tape | Somax Studios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        input, select, textarea {
            border: 1px solid #e2e8f0 !important;
        }
        input:focus, select:focus {
            border-color: #6366f1 !important;
            outline: none;
            ring: 2px ring-indigo-500/20;
        }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-900">

<div class="min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tight" id="page-title">Editar Tape</h1>
                <p class="text-slate-500 text-xs font-medium">Gerencie as informações e a lista de faixas</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="btnVoltar" class="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                    <i class="fas fa-arrow-left"></i> <span class="hidden md:inline">Voltar</span>
                </button>
                <button id="saveTopBtn" class="px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-black uppercase hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all flex items-center gap-2">
                    <i class="fas fa-save"></i> <span>Salvar</span>
                </button>
            </div>
        </div>

        <form id="tapeForm" class="space-y-8" onsubmit="return false;">
            
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fas fa-info-circle text-indigo-500"></i> Dados da Fita
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Título do Tape</label>
                        <input type="text" id="titulo" class="w-full px-4 py-2.5 rounded-xl text-sm font-semibold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Número do Tape</label>
                        <input type="text" id="numero_tape" class="w-full px-4 py-2.5 rounded-xl text-sm font-semibold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Status</label>
                        <select id="status" class="w-full px-4 py-2.5 rounded-xl text-sm font-semibold bg-white">
                            <option value="nao_subiu">⚪ Pendente</option>
                            <option value="on_stream">🟢 On Stream</option>
                            <option value="digitalizada">🔵 Digitalizada</option>
                            <option value="not_stream">🔴 Restrito</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Artista</label>
                        <select id="artista_id" class="w-full px-4 py-2.5 rounded-xl text-sm font-semibold bg-white"></select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Gravadora</label>
                        <select id="gravadora_id" class="w-full px-4 py-2.5 rounded-xl text-sm font-semibold bg-white"></select>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="fas fa-list-music text-indigo-500"></i> Faixas do Tape
                    </h2>
                    <button type="button" id="addFaixaBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                        <i class="fas fa-plus mr-1"></i> Adicionar Música
                    </button>
                </div>

                <div id="faixas-container" class="space-y-4 md:space-y-0">
                    </div>
            </div>

            <div class="flex items-center gap-3 pt-4 md:hidden">
                <button type="button" id="saveBottomBtn" class="flex-1 px-8 py-3.5 bg-indigo-600 text-white rounded-2xl text-sm font-black uppercase hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Configuração Supabase
    const supabaseClient = supabase.createClient('https://edabpftowxcyvsmuzzdf.supabase.co', 'sb_publishable_xUUhpgcgM7bc2Q5a02smMw_n5xDicbW');
    const tapeId = new URLSearchParams(window.location.search).get('id');
    let faixas = [];

    function setValue(id, value) {
        const el = document.getElementById(id);
        if (el) el.value = value ?? '';
    }

    async function carregarListas() {
        const { data: artistas } = await supabaseClient.from('artistas').select('id, nome').order('nome');
        const { data: gravadoras } = await supabaseClient.from('gravadoras').select('id, nome').order('nome');
        
        const artSel = document.getElementById('artista_id');
        const gravSel = document.getElementById('gravadora_id');
        
        if (artSel) {
            artSel.innerHTML = '<option value="">Selecione um artista</option>' + 
                artistas.map(a => `<option value="${a.id}">${a.nome}</option>`).join('');
        }
        if (gravSel) {
            gravSel.innerHTML = '<option value="">Selecione uma gravadora</option>' + 
                gravadoras.map(g => `<option value="${g.id}">${g.nome}</option>`).join('');
        }
    }

    async function carregarTape() {
        const { data: tape, error } = await supabaseClient
            .from('tapes')
            .select('*')
            .eq('id', tapeId)
            .single();

        if (error || !tape) {
            alert('Erro ao carregar tape.');
            window.location.href = 'tapes.html';
            return;
        }

        setValue('titulo', tape.titulo);
        setValue('numero_tape', tape.numero_tape);
        setValue('artista_id', tape.artista_id);
        setValue('gravadora_id', tape.gravadora_id);

        let statusValue = 'nao_subiu';
        if (tape.subiu_streaming) statusValue = 'on_stream';
        else if (tape.digitalizada) statusValue = 'digitalizada';
        else if (tape.nao_pode_subir) statusValue = 'not_stream';
        
        setValue('status', statusValue);
    }

    async function carregarFaixas() {
        const { data, error } = await supabaseClient
            .from('faixas')
            .select('*')
            .eq('tape_id', tapeId)
            .order('numero');

        if (error) {
            console.error('Erro ao carregar faixas:', error);
            return;
        }
        faixas = data || [];
        renderFaixas();
    }

    function renderFaixas() {
        const container = document.getElementById('faixas-container');
        if (!container) return;

        if (faixas.length === 0) {
            container.innerHTML = `
                <div class="bg-slate-50 p-8 text-center rounded-xl border border-dashed">
                    <p class="text-slate-400 text-sm">Nenhuma faixa cadastrada.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = `
            <div class="hidden md:grid grid-cols-12 gap-4 px-4 py-2 bg-slate-100 rounded-t-xl text-[10px] font-black uppercase text-slate-500">
                <div class="col-span-1">Lado</div>
                <div class="col-span-1">Nº</div>
                <div class="col-span-3">Música</div>
                <div class="col-span-3">Autor</div>
                <div class="col-span-2">Editora</div>
                <div class="col-span-1">%</div>
                <div class="col-span-1 text-center">Ação</div>
            </div>
        `;

        faixas.forEach((f, index) => {
            const card = document.createElement('div');
            card.className = "bg-white md:bg-transparent border-slate-200 p-5 md:p-3 md:grid md:grid-cols-12 md:gap-4 items-center border-b";
            
            card.innerHTML = `
                <div class="grid grid-cols-2 md:contents gap-3">
                    <div class="col-span-1">
                        <label class="md:hidden block text-[9px] font-black uppercase text-slate-400 mb-1">Lado</label>
                        <input type="text" value="${f.lado || ''}" onchange="updateFaixa(${index}, 'lado', this.value)" class="w-full px-3 py-2 rounded-lg text-sm border">
                    </div>
                    <div class="col-span-1">
                        <label class="md:hidden block text-[9px] font-black uppercase text-slate-400 mb-1">Nº</label>
                        <input type="text" value="${f.numero || ''}" onchange="updateFaixa(${index}, 'numero', this.value)" class="w-full px-3 py-2 rounded-lg text-sm border">
                    </div>
                    <div class="col-span-2 md:col-span-3">
                        <label class="md:hidden block text-[9px] font-black uppercase text-slate-400 mb-1">Título da Música</label>
                        <input type="text" value="${f.musica || ''}" onchange="updateFaixa(${index}, 'musica', this.value)" class="w-full px-3 py-2 rounded-lg text-sm font-bold border">
                    </div>
                    <div class="col-span-2 md:col-span-3">
                        <label class="md:hidden block text-[9px] font-black uppercase text-slate-400 mb-1">Autor</label>
                        <input type="text" value="${f.autor || ''}" onchange="updateFaixa(${index}, 'autor', this.value)" class="w-full px-3 py-2 rounded-lg text-sm border">
                    </div>
                    <div class="col-span-2 md:col-span-2">
                        <label class="md:hidden block text-[9px] font-black uppercase text-slate-400 mb-1">Editora</label>
                        <input type="text" value="${f.editora || ''}" onchange="updateFaixa(${index}, 'editora', this.value)" class="w-full px-3 py-2 rounded-lg text-sm border">
                    </div>
                    <div class="col-span-1">
                        <label class="md:hidden block text-[9px] font-black uppercase text-slate-400 mb-1">%</label>
                        <input type="text" value="${f.percentual || ''}" onchange="updateFaixa(${index}, 'percentual', this.value)" class="w-full px-3 py-2 rounded-lg text-sm border">
                    </div>
                    <div class="hidden md:flex col-span-1 justify-center">
                        <button type="button" onclick="removerFaixa(${index})" class="text-slate-300 hover:text-rose-500 p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.updateFaixa = (index, field, value) => {
        faixas[index][field] = value;
    };

    window.removerFaixa = (index) => {
        if (confirm("Remover esta faixa?")) {
            faixas.splice(index, 1);
            renderFaixas();
        }
    };

    document.getElementById('addFaixaBtn').addEventListener('click', () => {
        faixas.push({ 
            tape_id: tapeId, 
            lado: '', 
            numero: (faixas.length + 1).toString(), 
            musica: '', 
            autor: '', 
            editora: '', 
            percentual: '100' 
        });
        renderFaixas();
    });

    async function salvar() {
        try {
            const statusOpcao = document.getElementById('status')?.value || 'nao_subiu';
            const artId = document.getElementById('artista_id').value;
            const gravId = document.getElementById('gravadora_id').value;

            // 1. Atualiza os dados principais do Tape
            const tapeUpdate = {
                titulo: document.getElementById('titulo').value,
                numero_tape: document.getElementById('numero_tape').value,
                artista_id: artId === "" ? null : artId,
                gravadora_id: gravId === "" ? null : gravId,
                subiu_streaming: statusOpcao === 'on_stream',
                digitalizada: statusOpcao === 'digitalizada',
                nao_pode_subir: statusOpcao === 'not_stream'
            };

            const { error: tError } = await supabaseClient
                .from('tapes')
                .update(tapeUpdate)
                .eq('id', tapeId);

            if (tError) throw tError;

            // 2. Lógica Inteligente para atualizar/inserir/eliminar as Faixas
            
            // Filtra os IDs das faixas que já existiam na base de dados (que têm um 'id' definido) e que continuam na tela
            const idsParaManter = faixas.filter(f => f.id).map(f => f.id);

            if (idsParaManter.length > 0) {
                // Remove APENAS as faixas que foram excluídas na tela
                const { error: delError } = await supabaseClient
                    .from('faixas')
                    .delete()
                    .eq('tape_id', tapeId)
                    .not('id', 'in', `(${idsParaManter.join(',')})`);
                if (delError) throw delError;
            } else {
                // Se o utilizador removeu todas as faixas que existiam, limpa tudo deste tape_id
                const { error: delError } = await supabaseClient
                    .from('faixas')
                    .delete()
                    .eq('tape_id', tapeId);
                if (delError) throw delError;
            }

            // Prepara as faixas para inserir/atualizar (Upsert)
            const faixasToUpsert = faixas.map(f => {
                // Remove a data de criação para o supabase não dar erro, mas MANTÉM o ID
                const { created_at, ...cleanFaixa } = f; 
                return { ...cleanFaixa, tape_id: tapeId };
            });

            // Upsert: Se tem ID ele apenas atualiza, se não tem ID (nova faixa) ele cria e atribui um ID automaticamente
            if (faixasToUpsert.length > 0) {
                const { error: fError } = await supabaseClient
                    .from('faixas')
                    .upsert(faixasToUpsert);
                if (fError) throw fError;
            }

            alert('Tape atualizado com sucesso!');
            window.location.href = 'tapes.html';
        } catch (err) {
            console.error('Erro ao salvar:', err);
            alert('Erro ao salvar: ' + (err.message || "Verifique as configurações do banco."));
        }
    }

    document.getElementById('saveTopBtn')?.addEventListener('click', salvar);
    document.getElementById('saveBottomBtn')?.addEventListener('click', salvar);
    document.getElementById('btnVoltar').addEventListener('click', () => window.location.href = 'tapes.html');

    document.addEventListener('DOMContentLoaded', async () => {
        await carregarListas();
        await carregarTape();
        await carregarFaixas();
    });
</script>
</body>
</html>
